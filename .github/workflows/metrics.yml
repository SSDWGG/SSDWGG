name: Generate GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats card
        env:
          PAT_1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f github-stats.svg
          git clone --depth=1 https://github.com/anuraghazra/github-readme-stats.git /tmp/stats
          cd /tmp/stats
          npm install --silent
          node --input-type=module -e "
            import { fetchStats } from './src/fetchers/stats.js';
            import { renderStatsCard } from './src/cards/stats.js';
            import { writeFileSync } from 'fs';
            const stats = await fetchStats('SSDWGG');
            const svg = await renderStatsCard(stats, { show_icons: true, theme: 'gruvbox_light' });
            writeFileSync('github-stats.svg', svg);
          "
          cp /tmp/stats/github-stats.svg "$GITHUB_WORKSPACE/github-stats.svg"
          echo "Stats card generated ($(wc -c < "$GITHUB_WORKSPACE/github-stats.svg") bytes)"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: github-stats.svg
          commit_message: "Update GitHub stats"
