name: Generate GitHub Stats
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate stats SVG
        run: |
          docker run -d --name stats -p 9000:9000 ghcr.io/utkuozdemir/github-readme-stats-selfhosted:latest
          for i in $(seq 1 10); do
            if curl -sf "http://localhost:9000/api?username=SSDWGG&show_icons=true&theme=gruvbox_light" -o github-stats.svg; then
              echo "Stats generated successfully"
              break
            fi
            echo "Waiting for server... ($i/10)"
            sleep 3
          done
          docker stop stats
          [ -s github-stats.svg ] || exit 1
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: github-stats.svg
          commit_message: "Update GitHub stats"
